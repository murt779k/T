<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Pro Analyzer ⚔️</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: white; text-align: center; }
        .container { padding: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #7209b7; }
        input { width: 80%; padding: 10px; border-radius: 8px; border: none; margin: 10px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #7209b7; color: white; cursor: pointer; }
        #result { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .card { background: #1a1a2e; padding: 15px; border-radius: 10px; width: 200px; border-bottom: 3px solid gold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ محلل كلاش الاحترافي</h1>
        <div class="box">
            <input type="text" id="tag" placeholder="ID الكلان (بدون #)" value="2QYUQQ92G">
            <button onclick="checkClan()">فحص الكلان</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        async function checkClan() {
            const tag = document.getElementById('tag').value;
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "جاري التحميل...";
            try {
                const response = await fetch(`/api/clan?tag=${tag}`);
                const data = await response.json();
                if(data.error) throw new Error(data.error);
                
                let html = `<h2>🏰 ${data.name}</h2><div style="width:100%"></div>`;
                data.memberList.forEach(m => {
                    html += `<div class="card"><h3>${m.name}</h3><p>🏆 ${m.trophies}</p></div>`;
                });
                resDiv.innerHTML = html;
            } catch (e) {
                resDiv.innerHTML = "<p style='color:red'>خطأ في جلب البيانات. تأكد من إعدادات Vercel.</p>";
            }
        }
    </script>
</body>
</html>
